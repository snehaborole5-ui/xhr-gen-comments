<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Comments Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    
</head>
<body>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="m-0"><i class="fa-regular fa-comment-dots"></i> Comment Form</h4>
                    </div>
                    <div class="card-body">
                        <form id="commentForm">
                            <div class="form-group font-weight-bold">
                                <label for="title">Title*</label>
                                <input type="text" id="title" class="form-control" placeholder="Enter title..." required>
                            </div>
                            <div class="form-group font-weight-bold">
                                <label for="userId">User ID*</label>
                                <select id="userId" class="form-control" required>
                                    <option value="" disabled selected>Select User ID</option>
                                    <option value="1">User 1</option>
                                    <option value="2">User 2</option>
                                    <option value="3">User 3</option>
                                    <option value="4">User 4</option>
                                    <option value="5">User 5</option>
                                    <option value="6">User 6</option>
                                    <option value="7">User 7</option>
                                    <option value="8">User 8</option>
                                    <option value="9">User 9</option>
                                    <option value="10">User 10</option>
                                </select>
                            </div>
                            <div class="form-group font-weight-bold">
                                <label for="completed">Status*</label>
                                <select id="completed" class="form-control" required>
                                    <option value="false">Pending</option>
                                    <option value="true">Completed</option>
                                </select>
                            </div>
                            <button type="submit" id="addBtn" class="btn btn-primary btn-block">Add Comment</button>
                            <button type="button" id="updateBtn" class="btn btn-warning btn-block d-none">Update Comment</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h4 class="m-0"><i class="fa-solid fa-list"></i> Comments Registry</h4>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover m-0">
                                <thead class="thead-dark">
                                    <tr>
                                        <th>#</th>
                                        <th>Title</th>
                                        <th>User ID</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="commentTableBody">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
